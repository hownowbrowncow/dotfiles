# ── Shell ─────────────────────────────────────────────────────────────────────
set -g default-shell "/bin/bash"

# ── Prefix ────────────────────────────────────────────────────────────────────
# C-b is not acceptable -- Vim uses it
set-option -g prefix C-space
bind C-space send-prefix

# ── Reload ────────────────────────────────────────────────────────────────────
bind R source-file ~/.tmux.conf \; display "Config reloaded"

# ── Pane Management ──────────────────────────────────────────────────────────
# Resize panes with vim-style keys
bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind h resize-pane -L 5

# Splits and new windows preserve current path
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── General Settings ─────────────────────────────────────────────────────────
set -g mouse on
set -g base-index 1                  # Start window numbering at 1
setw -g pane-base-index 1            # Start pane numbering at 1
set -g renumber-windows on           # Renumber windows when one is closed
set -s escape-time 0                 # Faster key repetition
setw -g mode-keys vi                 # VI mode keys
set -g history-limit 50000           # Increase scrollback buffer
set -g display-time 4000             # Show messages for 4 seconds
set -g status-interval 5             # Refresh status bar more often
set -g focus-events on               # Enable focus events (for vim autoread)
setw -g aggressive-resize on         # Useful for grouped sessions / multi-monitor

# ── Colors ────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin '2kabhishek/tmux2k'
set -g @tmux2k-theme 'onedark'

# Initialize TMUX plugin manager (keep at the very bottom)
run -b '~/.tmux/plugins/tpm/tpm'
